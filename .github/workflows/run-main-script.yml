name: Daily JS Script Runner

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  run-js:
    runs-on: ubuntu-latest

    env:
      MY_SECRET_KEY: ${{ secrets.MY_SECRET_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'  # or any version you use

      - name: Install dependencies
        run: |
          npm install

      - name: Run JS script
        run: |
          node main.js
